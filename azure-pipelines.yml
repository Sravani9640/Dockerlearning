trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: 'sravani464/employeeapi'
  tag: 'latest'

steps:

- task: Docker@2
  displayName: Build Docker Image
  inputs:
    command: build
    repository: $(imageName)
    dockerfile: '**/Dockerfile'
    tags: |
      $(tag)

- task: Docker@2
  displayName: Push Docker Image
  inputs:
    command: push
    repository: $(imageName)
    containerRegistry: 'dockerhub-connection'
    tags: |
      $(tag)

- task: SSH@0
  displayName: Deploy to AWS EC2
  inputs:
    sshEndpoint: 'aws-ec2-ssh'
    runOptions: inline
    inline: |
      sudo docker pull $(imageName):$(tag)

      sudo docker stop employee-container || true
      sudo docker rm employee-container || true

      sudo docker run -d -p 8080:8080 \
      --name employee-container \
      $(imageName):$(tag)